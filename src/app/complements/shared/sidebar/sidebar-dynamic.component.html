<nav class="sidebar d-flex flex-column vh-100 position-fixed" [ngClass]="{'collapsed': isCollapsed, 'mobile-open': isMobileOpen}">
  <!-- Logo -->
  <div class="sidebar-logo p-3">
    <div class="d-flex align-items-center" *ngIf="!isCollapsed" style="flex: 1;">
      <i class="bi bi-building text-primary fs-4 me-2"></i>
      <span class="fw-bold text-white fs-5">Atlaxioma-Tech</span>
    </div>
    <div class="d-flex align-items-center justify-content-center" *ngIf="isCollapsed" style="flex: 1;">
      <i class="bi bi-building text-primary fs-4"></i>
    </div>
    <button type="button" class="btn-toggle d-none d-lg-flex" (click)="toggleSidebar()" [title]="isCollapsed ? 'Expandir' : 'Minimizar'">
      <i class="bi" [ngClass]="isCollapsed ? 'bi-chevron-right' : 'bi-chevron-left'"></i>
    </button>
    <button type="button" class="btn-toggle d-lg-none" (click)="closeMobileSidebar()" title="Cerrar menú">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <div class="sidebar-menu flex-grow-1 overflow-auto mt-2">
    <ul class="nav flex-column px-2">
      <!-- Dashboard (siempre visible) --> 
      <li class="nav-item">
        <a routerLink="/dashboard" routerLinkActive="active" class="nav-link d-flex align-items-center text-white" [title]="isCollapsed ? 'Dashboard' : ''">
          <i class="bi bi-grid-fill fs-5" [ngClass]="{'me-3': !isCollapsed}"></i>
          <span *ngIf="!isCollapsed">Dashboard</span>
        </a>
      </li>

      <!-- Menú dinámico basado en módulos -->
      <ng-container *ngFor="let item of modulos$ | async">
        <li class="nav-item">
          <!-- Item sin hijos -->
          <ng-container *ngIf="!item.hijos || item.hijos.length === 0">
            <a [routerLink]="item.ruta" routerLinkActive="active" class="nav-link d-flex align-items-center text-white" [title]="isCollapsed ? item.nombre : ''">
              <i [class]="'bi ' + item.icono + ' fs-5'" [ngClass]="{'me-3': !isCollapsed}"></i>
              <span *ngIf="!isCollapsed">{{ item.nombre }}</span>
            </a>
          </ng-container>

          <!-- Item con hijos -->
          <ng-container *ngIf="item.hijos && item.hijos.length > 0">
            <div class="nav-link-wrapper">
              <a [routerLink]="item.ruta" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link d-flex align-items-center text-white-50" [title]="isCollapsed ? item.nombre : ''" style="flex: 1;">
                <i [class]="'bi ' + item.icono + ' fs-5'" [ngClass]="{'me-3': !isCollapsed}"></i>
                <span *ngIf="!isCollapsed">{{ item.nombre }}</span>
              </a>
              <button *ngIf="!isCollapsed" type="button" class="btn-dropdown" [attr.data-bs-toggle]="'collapse'" [attr.data-bs-target]="'#menu-' + item.id" [attr.aria-expanded]="false">
                <i class="bi bi-chevron-down"></i>
              </button>
            </div>
            
            <!-- Submenu -->
            <ul class="collapse list-unstyled ps-5" [id]="'menu-' + item.id" *ngIf="!isCollapsed">
              <ng-container *ngFor="let hijo of item.hijos">
                <!-- Hijo sin sub-hijos -->
                <li class="submenu-item" *ngIf="!hijo.hijos || hijo.hijos.length === 0">
                  <a [routerLink]="hijo.ruta" routerLinkActive="active" class="nav-link text-white-50 py-2 d-flex align-items-center">
                    <i [class]="'bi ' + hijo.icono + ' me-2'"></i>
                    <span>{{ hijo.nombre }}</span>
                  </a>
                </li>

                <!-- Hijo con sub-hijos (tercer nivel) -->
                <li class="submenu-item" *ngIf="hijo.hijos && hijo.hijos.length > 0">
                  <a class="nav-link text-white-50 py-2 d-flex align-items-center" [attr.data-bs-toggle]="'collapse'" [attr.data-bs-target]="'#submenu-' + hijo.id">
                    <i [class]="'bi ' + hijo.icono + ' me-2'"></i>
                    <span>{{ hijo.nombre }}</span>
                    <i class="bi bi-chevron-down ms-auto small"></i>
                  </a>
                  <ul class="collapse list-unstyled ps-4" [id]="'submenu-' + hijo.id">
                    <li *ngFor="let subhijo of hijo.hijos">
                      <a [routerLink]="subhijo.ruta" routerLinkActive="active" class="nav-link text-white-50 py-1 small">
                        {{ subhijo.nombre }}
                      </a>
                    </li>
                  </ul>
                </li>
              </ng-container>
            </ul>
          </ng-container>
        </li>
      </ng-container>
    </ul>
  </div>
</nav>

<!-- Overlay para cerrar sidebar en móvil -->
<div class="sidebar-overlay" [class.show]="isMobileOpen" (click)="closeMobileSidebar()"></div>
