<nav class="navbar" [class.sidebar-collapsed]="isSidebarCollapsed">
  <div class="navbar-content">
    <!-- Left Section -->
    <div class="navbar-left">
      <p-button 
        icon="pi pi-bars" 
        [text]="true" 
        [rounded]="true"
        (onClick)="toggleMobileSidebar()"
        styleClass="btn-menu d-lg-none">
      </p-button>
    </div>

    <!-- Right Section -->
    <div class="navbar-right">
      <!-- Notificaciones -->
      <p-button 
        icon="pi pi-bell" 
        [text]="true" 
        [rounded]="true"
        [badge]="'3'"
        badgeSeverity="danger"
        styleClass="btn-notification">
      </p-button>

      <!-- User Menu -->
      <div class="user-section">
        <p-button 
          (onClick)="menu.toggle($event)"
          [text]="true"
          styleClass="btn-user">
          <div class="user-button-content">
            <p-avatar 
              [label]="getUserInitials()" 
              styleClass="user-avatar"
              shape="circle">
            </p-avatar>
            <div class="user-info d-none d-md-block">
              <div class="user-name">{{ currentUser?.name || 'Usuario' }}</div>
              <div class="user-role">{{ getUserRole() }}</div>
            </div>
            <i class="pi pi-chevron-down"></i>
          </div>
        </p-button>

        <p-menu 
          #menu 
          [model]="userMenuItems" 
          [popup]="true"
          [appendTo]="'body'"
          styleClass="user-menu">
          <ng-template pTemplate="start">
            <div class="user-menu-header">
              <p-avatar 
                [label]="getUserInitials()" 
                size="large"
                shape="circle"
                styleClass="user-avatar-large">
              </p-avatar>
              <div class="user-menu-info">
                <div class="user-menu-name">{{ currentUser?.name || 'Usuario' }}</div>
                <div class="user-menu-email">{{ currentUser?.email }}</div>
                <p-badge [value]="getUserRole()" severity="info"></p-badge>
              </div>
            </div>
          </ng-template>
        </p-menu>
      </div>
    </div>
  </div>
</nav>
