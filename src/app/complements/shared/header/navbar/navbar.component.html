<nav class="navbar navbar-expand-lg bg-white shadow-sm px-4 py-2">
  <div class="d-flex align-items-center w-100 justify-content-between">
    <div class="d-flex align-items-center">
      <button class="btn btn-outline-light me-3 d-lg-none" type="button">
        <i class="bi bi-list"></i>
      </button>
      <ul class="nav nav-tabs border-0">
        <li class="nav-item">
          <a class="nav-link active" routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/layout-builder">Layout Builder</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/apps">Apps</a>
        </li>
      </ul>
    </div>

    <!-- User Dropdown -->
    <div class="d-flex align-items-center position-relative">
      <!-- Notificaciones (opcional) -->
      <button class="btn btn-icon btn-light me-2" type="button" title="Notificaciones">
        <i class="bi bi-bell"></i>
      </button>

      <!-- User Avatar Dropdown -->
      <div class="user-dropdown" [class.show]="isDropdownOpen">
        <button class="btn btn-user d-flex align-items-center gap-2" type="button" (click)="toggleDropdown()"
          [attr.aria-expanded]="isDropdownOpen">

          <!-- Avatar con iniciales o imagen -->
          <div class="user-avatar">
            <img src="https://i.pravatar.cc/40" class="rounded-circle" width="40" height="40" alt="user" />
            <!-- <span class="user-initials">{{ getUserInitials() }}</span> -->
          </div>

          <!-- Info del usuario (opcional, ocultar en móvil) -->
          <div class="user-info d-none d-md-block text-start">
            <div class="user-name">{{ currentUser?.name || 'Usuario' }}</div>
            <div class="user-role">{{ getUserRole() }}</div>
          </div>

          <!-- Icono dropdown -->
          <i class="bi bi-chevron-down" [class.rotate]="isDropdownOpen"></i>
        </button>

        <!-- Dropdown Menu -->
        <div class="dropdown-menu dropdown-menu-end" [class.show]="isDropdownOpen">
          <!-- User Info Header -->
          <div class="dropdown-header">
            <div class="d-flex align-items-center gap-3">
              <div class="user-avatar-large">
                <span class="user-initials">{{ getUserInitials() }}</span>
              </div>
              <div>
                <div class="fw-bold">{{ currentUser?.name || 'Usuario' }}</div>
                <div class="text-muted small">{{ currentUser?.email }}</div>
                <div class="badge bg-primary mt-1">{{ getUserRole() }}</div>
              </div>
            </div>
          </div>

          <div class="dropdown-divider"></div>

          <!-- Menu Items -->
          <a class="dropdown-item" (click)="goToProfile()">
            <i class="bi bi-person me-2"></i>
            Mi Perfil
          </a>

          <a class="dropdown-item" (click)="goToSettings()">
            <i class="bi bi-gear me-2"></i>
            Configuración
          </a>

          <div class="dropdown-divider"></div>

          <a class="dropdown-item text-danger" (click)="logout()">
            <i class="bi bi-box-arrow-right me-2"></i>
            Cerrar Sesión
          </a>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Overlay para cerrar el dropdown al hacer clic fuera -->
<div class="dropdown-overlay" *ngIf="isDropdownOpen" (click)="closeDropdown()">
</div>
