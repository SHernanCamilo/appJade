<nav class="navbar" [class.sidebar-collapsed]="isSidebarCollapsed">
  <div class="navbar-content">
    <!-- Left Section -->
    <div class="navbar-left">
      <p-button 
        icon="pi pi-bars" 
        [text]="true" 
        [rounded]="true"
        (onClick)="toggleMobileSidebar()"
        styleClass="btn-menu d-lg-none">
      </p-button>
    </div>

    <!-- Right Section -->
    <div class="navbar-right">
      <!-- Notificaciones -->
      <!-- <p-button 
        icon="pi pi-bell" 
        [text]="true" 
        [rounded]="true"
        [badge]="'3'"
        badgeSeverity="danger"
        styleClass="btn-notification">
      </p-button> -->

      <!-- User Menu -->
      <div class="user-section">
        <p-button 
          (onClick)="menu.toggle($event)"
          [text]="true"
          styleClass="btn-user">
          <div class="user-button-content">
            <p-avatar 
              [label]="getUserInitials()" 
              styleClass="user-avatar"
              shape="circle">
            </p-avatar>
            <div class="user-info d-none d-md-block">
              <div class="user-name">{{ currentUser?.name || 'Usuario' }}</div>
              <div class="user-role">{{ getUserRole() }}</div>
            </div>
            <i class="pi pi-chevron-down"></i>
          </div>
        </p-button>

        <p-menu 
          #menu 
          [model]="userMenuItems" 
          [popup]="true"
          [appendTo]="'body'"
          styleClass="user-menu">
        </p-menu>
      </div>
    </div>
  </div>
</nav>

<!-- Modal de Personificación -->
<p-dialog 
  [(visible)]="showPersonificarModal"
  header="Personificar Usuario"
  [modal]="true"
  [closable]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{width: '90vw', maxWidth: '1200px', height: '80vh'}"
  [breakpoints]="{'960px': '95vw'}"
  styleClass="personificar-dialog"
  (onHide)="closePersonificarModal()">
  <app-personificar-simple 
    [visible]="showPersonificarModal"
    (onClose)="closePersonificarModal()">
  </app-personificar-simple>
</p-dialog>
