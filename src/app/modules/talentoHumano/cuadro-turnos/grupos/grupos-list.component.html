<div class="page-container">
  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>

  <div class="page-header-modern">
    <div class="header-top">
      <button class="btn-back-modern" routerLink="/talentoHumano">
        <i class="pi pi-arrow-left"></i> Volver
      </button>
    </div>
    <div class="header-main">
      <div class="header-title-section">
        <h1 class="page-title-modern"><i class="pi pi-users me-2"></i>Grupos de Turnos</h1>
        <p class="page-subtitle-modern">Administración de grupos y sus encargados</p>
      </div>
      <div class="header-actions">
        <button class="btn-action btn-action-primary" (click)="abrirNuevo()">
          <i class="pi pi-plus"></i> Nuevo Grupo
        </button>
      </div>
    </div>
  </div>

  <div class="dashboard-content">
    <div class="table-section">
      <div class="modern-table-container">
        <p-table [value]="grupos" [loading]="isLoading" styleClass="modern-table"
          [paginator]="true" [rows]="15" [rowsPerPageOptions]="[15,30,50]">
          <ng-template pTemplate="header">
            <tr>
              <th>Código</th><th>Nombre</th><th>Sede</th>
              <th>Encargado Actual</th><th>Estado</th><th>Acciones</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-g>
            <tr>
              <td><code>{{ g.codigo }}</code></td>
              <td>
                <div class="fw-600">{{ g.nombre }}</div>
                <small class="text-muted">{{ g.descripcion }}</small>
              </td>
              <td>{{ g.sede?.nombre ?? '—' }}</td>
              <td>
                <span *ngIf="g.encargado_actual">{{ g.encargado_actual.user?.name ?? '—' }}</span>
                <p-tag *ngIf="!g.encargado_actual" value="Sin encargado" severity="warn"></p-tag>
              </td>
              <td>
                <p-tag [value]="g.estado ? 'Activo' : 'Inactivo'" [severity]="g.estado ? 'success' : 'danger'"></p-tag>
              </td>
              <td>
                <div class="action-buttons">
                  <button class="btn-action-icon btn-action-primary"
                    [routerLink]="['/talentoHumano/cuadro-turnos/grupos', g.id]"
                    pTooltip="Ver detalle" tooltipPosition="top">
                    <i class="pi pi-eye"></i>
                  </button>
                  <button class="btn-action-icon btn-action-success" (click)="editar(g)" pTooltip="Editar" tooltipPosition="top">
                    <i class="pi pi-pencil"></i>
                  </button>
                  <button class="btn-action-icon btn-action-danger" (click)="eliminar(g)" pTooltip="Desactivar" tooltipPosition="top">
                    <i class="pi pi-trash"></i>
                  </button>
                </div>
              </td>
            </tr>
          </ng-template>
          <ng-template pTemplate="emptymessage">
            <tr><td colspan="6" class="text-center py-5">
              <i class="pi pi-users" style="font-size:3rem;color:#9ca3af"></i>
              <p class="text-muted mt-3">No hay grupos registrados</p>
            </td></tr>
          </ng-template>
          <ng-template pTemplate="loadingbody">
            <tr *ngFor="let i of [1,2,3,4,5]">
              <td *ngFor="let j of [1,2,3,4,5,6]"><p-skeleton></p-skeleton></td>
            </tr>
          </ng-template>
        </p-table>
      </div>
    </div>
  </div>
</div>

<p-dialog [header]="editMode ? 'Editar Grupo' : 'Nuevo Grupo'" [(visible)]="showDialog" [modal]="true" [style]="{width:'440px'}">
  <div class="form-grid-2">
    <div class="form-field">
      <label>Código *</label>
      <input pInputText [(ngModel)]="form.codigo" placeholder="UCI-P3" class="w-100">
    </div>
    <div class="form-field">
      <label>Nombre *</label>
      <input pInputText [(ngModel)]="form.nombre" placeholder="UCI Piso 3" class="w-100">
    </div>
    <div class="form-field form-field-full">
      <label>Descripción</label>
      <textarea pTextarea [(ngModel)]="form.descripcion" rows="2" class="w-100"></textarea>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" [outlined]="true" (onClick)="showDialog=false"></p-button>
    <p-button label="Guardar" icon="pi pi-check" severity="success" (onClick)="guardar()" [loading]="isSaving"></p-button>
  </ng-template>
</p-dialog>
