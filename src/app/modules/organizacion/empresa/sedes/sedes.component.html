<div class="page-container">
  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>

  <!-- Header Moderno -->
  <div class="page-header-modern">
    <div class="header-top">
      <button class="btn-back-modern" routerLink="/organizacion">
        <i class="pi pi-arrow-left"></i>
        Volver
      </button>
    </div>
    
    <div class="header-main">
      <div class="header-title-section">
        <h1 class="page-title-modern">
          <i class="bi bi-geo-alt-fill me-2"></i>
          Gestión de Sedes
        </h1>
        <p class="page-subtitle-modern">Administra las sedes de cada sucursal</p>
      </div>
      
      <div class="header-actions">
        <button 
          *hasPermission="'org-sede-crear'"
          class="btn-action btn-action-primary"
          (click)="toggleForm()">
          <i class="pi" [ngClass]="showForm ? 'pi-times' : 'pi-plus'"></i>
          {{ showForm ? 'Cancelar' : 'Nueva Sede' }}
        </button>
      </div>
    </div>
  </div>

  <p-dialog 
    [(visible)]="showForm" 
    [header]="editMode ? 'Editar Sede' : 'Nueva Sede'" 
    [modal]="true" 
    [style]="{width: '50vw'}"
    [breakpoints]="{'960px': '75vw', '640px': '90vw'}"
    [contentStyle]="{'overflow': 'visible'}">
    
    <form [formGroup]="sedeForm" (ngSubmit)="onSubmit()">
      <div class="p-fluid">
        <h6 class="section-subtitle">
          <i class="bi bi-geo-alt-fill me-2"></i>
          Información de la Sede
        </h6>
        <div class="form-card-assignment">
          <div class="mb-3">
            <label for="nombre">Nombre de la Sede *</label>
            <input 
              pInputText 
              id="nombre" 
              formControlName="nombre"
              placeholder="Ej: Sede Principal - Piso 1"
              [class.ng-invalid]="sedeForm.get('nombre')?.invalid && sedeForm.get('nombre')?.touched">
            <small class="p-error" *ngIf="sedeForm.get('nombre')?.hasError('required') && sedeForm.get('nombre')?.touched">
              El nombre es obligatorio
            </small>
          </div>

          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="id_Empresa">Empresa *  </label>
              <p-dropdown 
                id="id_Empresa"
                [(ngModel)]="selectedEmpresa"
                [ngModelOptions]="{standalone: true}"
                [options]="empresas"
                optionLabel="nombre"
                optionValue="id"
                placeholder="Seleccione una empresa"
                [filter]="true"
                filterBy="nombre"
                [showClear]="true"
                appendTo="body"
                (onChange)="onEmpresaChange($event)">
              </p-dropdown>
            </div>

            <div class="col-md-6 mb-3">
              <label for="id_Sucursal">Sucursal *  </label>
              <p-dropdown 
                id="id_Sucursal"
                formControlName="id_Sucursal"
                [options]="sucursalesFiltered"
                optionLabel="nombre"
                optionValue="id"
                placeholder="Seleccione una sucursal"
                [filter]="true"
                filterBy="nombre"
                [showClear]="true"
                [disabled]="!selectedEmpresa"
                appendTo="body"
                [class.ng-invalid]="sedeForm.get('id_Sucursal')?.invalid && sedeForm.get('id_Sucursal')?.touched">
              </p-dropdown>
              <small class="p-error" *ngIf="sedeForm.get('id_Sucursal')?.hasError('required') && sedeForm.get('id_Sucursal')?.touched">
                Debe seleccionar una sucursal
              </small>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mt-4">
        <p-button 
          label="Cancelar" 
          icon="pi pi-times" 
          (onClick)="toggleForm()"
          styleClass="p-button-text">
        </p-button>
        <p-button 
          [label]="editMode ? 'Actualizar' : 'Crear Sede'" 
          icon="pi pi-check" 
          type="submit"
          [disabled]="sedeForm.invalid || isSubmitting"
          [loading]="isSubmitting">
        </p-button>
      </div>
    </form>
  </p-dialog>

  <div class="content-card">
    <app-data-table
      [value]="sedes"
      [columns]="columns"
      [loading]="isLoading"
      title="Lista de Sedes"
      titleIcon="bi bi-geo-alt"
      [showGlobalSearch]="canSearch()"
      [globalFilterFields]="['nombre', 'sucursal.nombre', 'sucursal.empresa.nombre']"
      currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} sedes"
      emptyMessage="No hay sedes registradas">

      <ng-template pTemplate="cell-nombre" let-row>
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-pin-map-fill" style="font-size: 1.5rem; color: #10b981;"></i>
          <span class="fw-semibold">{{ row.nombre }}</span>
        </div>
      </ng-template>

      <ng-template pTemplate="cell-sucursal.nombre" let-row>
        <span>{{ row.sucursal?.nombre || 'Sin sucursal' }}</span>
      </ng-template>

      <ng-template pTemplate="cell-sucursal.empresa.nombre" let-row>
        <div class="d-flex align-items-center gap-2">
          <p-tag [value]="row.sucursal?.empresa?.prefijo || 'N/A'" severity="info"></p-tag>
          <span>{{ row.sucursal?.empresa?.nombre || 'Sin empresa' }}</span>
        </div>
      </ng-template>

      <ng-template pTemplate="actions" let-row>
        <div class="d-flex gap-2">
          <p-button
            *hasPermission="'org-sede-editar'"
            icon="pi pi-pencil"
            styleClass="p-button-rounded p-button-text p-button-info"
            (onClick)="editSede(row)"
            pTooltip="Editar"
            tooltipPosition="top">
          </p-button>
          <p-button
            *hasPermission="'org-sede-eliminar'"
            icon="pi pi-trash"
            styleClass="p-button-rounded p-button-text p-button-danger"
            (onClick)="deleteSede(row)"
            pTooltip="Eliminar"
            tooltipPosition="top">
          </p-button>
        </div>
      </ng-template>

      <ng-template pTemplate="empty">
        <i class="pi pi-map-marker" style="font-size: 3rem; color: #94a3b8;"></i>
        <p class="text-muted mt-3">No hay sedes registradas</p>
        <p-button
          *hasPermission="'org-sede-crear'"
          label="Crear Primera Sede"
          icon="pi pi-plus"
          (onClick)="toggleForm()">
        </p-button>
      </ng-template>
    </app-data-table>
  </div>
</div>
