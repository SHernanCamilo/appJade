<div class="page-container">
  <p-toast></p-toast>
  <p-confirmDialog></p-confirmDialog>

  <!-- Header Moderno -->
  <div class="page-header-modern">
    <div class="header-top">
      <button class="btn-back-modern" routerLink="/organizacion">
        <i class="pi pi-arrow-left"></i>
        Volver
      </button>
    </div>
    
    <div class="header-main">
      <div class="header-title-section">
        <h1 class="page-title-modern">
          <i class="bi bi-shop me-2"></i>
          Gestión de Sucursales
        </h1>
        <p class="page-subtitle-modern">Administra las sucursales de cada empresa</p>
      </div>
      
      <div class="header-actions">
        <!-- Botón Crear Sucursal - Solo visible con permiso -->
        <button 
          *hasPermission="'org-suc-crear'"
          class="btn-action btn-action-primary"
          (click)="toggleForm()">
          <i class="pi" [ngClass]="showForm ? 'pi-times' : 'pi-plus'"></i>
          {{ showForm ? 'Cancelar' : 'Nueva Sucursal' }}
        </button>
      </div>
    </div>
  </div>

  <p-dialog 
    [(visible)]="showForm" 
    [header]="editMode ? 'Editar Sucursal' : 'Nueva Sucursal'" 
    [modal]="true" 
    [style]="{width: '50vw'}"
    [breakpoints]="{'960px': '75vw', '640px': '90vw'}">
    
    <form [formGroup]="sucursalForm" (ngSubmit)="onSubmit()">
      <div class="p-fluid">
        <h6 class="section-subtitle">
          <i class="bi bi-shop me-2"></i>
          Información de la Sucursal
        </h6>
        <div class="form-card-assignment">
          <div class="mb-3">
            <label for="nombre">Nombre de la Sucursal *</label>
            <input 
              pInputText 
              id="nombre" 
              formControlName="nombre"
              placeholder="Ej: Sucursal Norte"
              [class.ng-invalid]="sucursalForm.get('nombre')?.invalid && sucursalForm.get('nombre')?.touched">
            <small class="p-error" *ngIf="sucursalForm.get('nombre')?.hasError('required') && sucursalForm.get('nombre')?.touched">
              El nombre es obligatorio
            </small>
          </div>

          <div class="mb-3">
            <label for="prefijo">Prefijo</label>
            <input
              pInputText
              id="prefijo"
              formControlName="prefijo"
              maxlength="10"
              placeholder="Ej: NVA"
              style="text-transform: uppercase"
              [class.ng-invalid]="sucursalForm.get('prefijo')?.invalid && sucursalForm.get('prefijo')?.touched">
            <small class="p-error" *ngIf="sucursalForm.get('prefijo')?.hasError('maxlength') && sucursalForm.get('prefijo')?.touched">
              El prefijo no puede exceder 10 caracteres
            </small>
          </div>

          <div class="mb-3">
            <label for="id_Empresa">Empresa *</label>
            <p-dropdown 
              id="id_Empresa"
              formControlName="id_Empresa"
              [options]="empresas"
              optionLabel="nombre"
              optionValue="id"
              placeholder="Seleccione una empresa"
              [filter]="true"
              filterBy="nombre"
              [showClear]="true"
              [class.ng-invalid]="sucursalForm.get('id_Empresa')?.invalid && sucursalForm.get('id_Empresa')?.touched">
            </p-dropdown>
            <small class="p-error" *ngIf="sucursalForm.get('id_Empresa')?.hasError('required') && sucursalForm.get('id_Empresa')?.touched">
              Debe seleccionar una empresa
            </small>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end gap-2 mt-4">
        <p-button 
          label="Cancelar" 
          icon="pi pi-times" 
          (onClick)="toggleForm()"
          styleClass="p-button-text">
        </p-button>
        <p-button 
          [label]="editMode ? 'Actualizar' : 'Crear Sucursal'" 
          icon="pi pi-check" 
          type="submit"
          [disabled]="sucursalForm.invalid || isSubmitting"
          [loading]="isSubmitting">
        </p-button>
      </div>
    </form>
  </p-dialog>

  <div class="content-card">
    <app-data-table
      [value]="sucursales"
      [columns]="columns"
      [loading]="isLoading"
      title="Lista de Sucursales"
      titleIcon="bi bi-shop"
      [globalFilterFields]="['nombre', 'prefijo', 'empresa.nombre']"
      currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} sucursales"
      emptyMessage="No hay sucursales registradas">

      <ng-template pTemplate="cell-nombre" let-row>
        <div class="d-flex align-items-center gap-2">
          <i class="bi bi-shop-window" style="font-size: 1.5rem; color: #3b82f6;"></i>
          <span class="fw-semibold">{{ row.nombre }}</span>
        </div>
      </ng-template>

      <ng-template pTemplate="cell-prefijo" let-row>
        <p-tag [value]="row.prefijo || 'N/A'" severity="secondary"></p-tag>
      </ng-template>

      <ng-template pTemplate="cell-empresa.nombre" let-row>
        <div class="d-flex align-items-center gap-2">
          <p-tag [value]="row.empresa?.prefijo || 'N/A'" severity="info"></p-tag>
          <span>{{ row.empresa?.nombre || 'Sin empresa' }}</span>
        </div>
      </ng-template>

      <ng-template pTemplate="actions" let-row>
        <div class="d-flex gap-2">
          <p-button
            *hasPermission="'org-suc-editar'"
            icon="pi pi-pencil"
            styleClass="p-button-rounded p-button-text p-button-info"
            (onClick)="editSucursal(row)"
            pTooltip="Editar"
            tooltipPosition="top">
          </p-button>
          <p-button
            *hasPermission="'org-suc-eliminar'"
            icon="pi pi-trash"
            styleClass="p-button-rounded p-button-text p-button-danger"
            (onClick)="deleteSucursal(row)"
            pTooltip="Eliminar"
            tooltipPosition="top">
          </p-button>
        </div>
      </ng-template>

      <ng-template pTemplate="empty">
        <i class="pi pi-building" style="font-size: 3rem; color: #94a3b8;"></i>
        <p class="text-muted mt-3">No hay sucursales registradas</p>
        <p-button
          *hasPermission="'org-suc-crear'"
          label="Crear Primera Sucursal"
          icon="pi pi-plus"
          (onClick)="toggleForm()">
        </p-button>
      </ng-template>
    </app-data-table>
  </div>
</div>
