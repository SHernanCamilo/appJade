<div class="fullscreen-container">
  <app-grid-loader *ngIf="isLoading"
    [mensaje]="'Cargando vista completa...'"
    [subtitulo]="'Consultando todos los registros desde Fabric'"
    [columnas]="8" [filas]="12">
  </app-grid-loader>

  <div *ngIf="!isLoading && vista" class="grid-container">
    <ag-grid-angular
      class="ag-theme-alpine"
      style="width: 100%; height: 100%;"
      [rowData]="rowData"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      [localeText]="localeText"
      [animateRows]="true"
      [pagination]="true"
      [paginationPageSize]="50"
      [paginationPageSizeSelector]="[25, 50, 100, 200]"
      (gridReady)="onGridReady($event)">
    </ag-grid-angular>
  </div>
</div>
