<div class="pivot-container">
  <!-- Header -->
  <div class="pivot-header">
    <div class="pivot-title">
      <i class="pi pi-table"></i>
      <span>Tabla Dinámica — {{ vistaLabel }}</span>
    </div>
    <div class="pivot-stats" *ngIf="showPivot">
      <span class="badge-rows">{{ totalGroups.toLocaleString('es-CO') }} grupos</span>
      <span class="badge-time" *ngIf="elapsedMs">{{ (elapsedMs / 1000).toFixed(1) }}s</span>
    </div>
  </div>

  <!-- Configuración -->
  <div class="pivot-config" *ngIf="!isLoadingColumns && !showPivot">
    <div class="config-section">
      <h4><i class="pi pi-list"></i> Agrupar por (filas)</h4>
      <div class="chips-container">
        <span class="chip" *ngFor="let row of selectedRows">
          {{ row }}
          <i class="pi pi-times chip-remove" (click)="removeRow(row)"></i>
        </span>
      </div>
      <select class="config-select" (change)="addRow($any($event.target).value); $any($event.target).value=''">
        <option value="">+ Agregar columna...</option>
        <option *ngFor="let col of columns" [value]="col.name" [disabled]="selectedRows.includes(col.name)">
          {{ col.name }} ({{ col.type }})
        </option>
      </select>
    </div>

    <div class="config-section">
      <h4><i class="pi pi-calculator"></i> Valores a calcular</h4>
      <div class="value-rows">
        <div class="value-row" *ngFor="let val of selectedValues; let i = index">
          <select [(ngModel)]="val.field" class="config-select">
            <option value="*">Registros (COUNT *)</option>
            <option *ngFor="let col of numericColumns" [value]="col.name">{{ col.name }}</option>
          </select>
          <select [(ngModel)]="val.aggregation" class="config-select-sm">
            <option *ngFor="let opt of aggOptions" [value]="opt.value">{{ opt.label }}</option>
          </select>
          <button class="btn-remove" (click)="removeValue(i)" *ngIf="selectedValues.length > 1">
            <i class="pi pi-trash"></i>
          </button>
        </div>
      </div>
      <button class="btn-add" (click)="addValue()">
        <i class="pi pi-plus"></i> Agregar valor
      </button>
    </div>

    <div class="config-actions">
      <button class="btn-execute" (click)="ejecutarAgregacion()" [disabled]="isLoadingData || selectedRows.length === 0">
        <i class="pi pi-play" *ngIf="!isLoadingData"></i>
        <i class="pi pi-spin pi-spinner" *ngIf="isLoadingData"></i>
        {{ isLoadingData ? 'Calculando...' : 'Ejecutar tabla dinámica' }}
      </button>
    </div>
  </div>

  <!-- Botón volver a configurar -->
  <div class="pivot-toolbar" *ngIf="showPivot">
    <button class="btn-reconfig" (click)="showPivot = false">
      <i class="pi pi-cog"></i> Cambiar configuración
    </button>
  </div>

  <!-- Loading -->
  <div class="pivot-loading" *ngIf="isLoadingColumns || isLoadingData">
    <div class="spinner"></div>
    <p *ngIf="isLoadingColumns">Cargando columnas...</p>
    <p *ngIf="isLoadingData">Ejecutando agregación en Fabric SQL...</p>
  </div>

  <!-- Error -->
  <div class="pivot-error" *ngIf="errorMessage">
    <i class="pi pi-exclamation-triangle"></i>
    <p>{{ errorMessage }}</p>
    <button class="btn-retry" (click)="errorMessage = ''">Intentar de nuevo</button>
  </div>

  <!-- WebDataRocks Pivot Table -->
  <div class="pivot-wrapper" [class.hidden]="!showPivot">
    <app-wbr-pivot #pivotRef
      [toolbar]="true"
      [width]="'100%'"
      [height]="'calc(100vh - 140px)'"
      (ready)="onPivotReady()">
    </app-wbr-pivot>
  </div>
</div>
