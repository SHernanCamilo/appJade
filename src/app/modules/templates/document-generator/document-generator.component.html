<div class="document-generator-container">
  <!-- Header -->
  <div class="header">
    <h1>Generar Documento</h1>
    <button class="btn btn-secondary" (click)="goBack()">
      <i class="fas fa-arrow-left"></i> Volver
    </button>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando plantilla...</p>
  </div>

  <!-- Error -->
  <div *ngIf="error" class="error-message">
    <i class="fas fa-exclamation-circle"></i>
    {{ error }}
  </div>

  <!-- Contenido principal -->
  <div *ngIf="!loading && template" class="generator-content">
    <!-- Información de la plantilla -->
    <div class="template-info-card">
      <h2>{{ template.name }}</h2>
      <p class="category">Categoría: {{ getCategoryDisplayName(template.category) }}</p>
    </div>

    <!-- Formulario de variables -->
    <div class="variables-form-section">
      <h3>Complete los siguientes campos</h3>
      <p class="help-text">Los campos marcados con * son obligatorios</p>

      <form [formGroup]="variableForm" class="variables-form">
        <div *ngFor="let variable of templateVariables" class="form-group">
          <label [for]="variable.name">
            {{ variable.displayName }}
            <span *ngIf="variable.required" class="required">*</span>
          </label>
          <p class="field-description">{{ variable.description }}</p>
          
          <input 
            [id]="variable.name"
            [type]="getInputType(variable)"
            [formControlName]="variable.name"
            class="form-control"
            [placeholder]="'Ingrese ' + variable.displayName.toLowerCase()">
        </div>
      </form>
    </div>

    <!-- Acciones -->
    <div class="actions-section">
      <button 
        class="btn btn-info btn-lg" 
        (click)="generatePreview()"
        [disabled]="generating || !isFormValid()">
        <i class="fas fa-eye"></i> Vista Previa
      </button>
      
      <button 
        class="btn btn-success btn-lg" 
        (click)="generateHTML()"
        [disabled]="generating || !isFormValid()">
        <i class="fas fa-file-code"></i> Generar HTML
      </button>
      
      <button 
        class="btn btn-danger btn-lg" 
        (click)="generatePDF()"
        [disabled]="generating || !isFormValid()">
        <i class="fas fa-file-pdf"></i> Generar PDF
      </button>
    </div>
  </div>

  <!-- Modal de vista previa -->
  <div *ngIf="showPreview" class="preview-modal" (click)="closePreview()">
    <div class="preview-content" (click)="$event.stopPropagation()">
      <div class="preview-header">
        <h3>Vista Previa del Documento</h3>
        <button class="btn-close" (click)="closePreview()">
          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <div class="preview-body">
        <div class="preview-document" [innerHTML]="previewContent"></div>
      </div>
      
      <div class="preview-footer">
        <button class="btn btn-secondary" (click)="closePreview()">
          Cerrar
        </button>
        <button class="btn btn-success" (click)="generateHTML()">
          <i class="fas fa-download"></i> Descargar HTML
        </button>
        <button class="btn btn-danger" (click)="generatePDF()">
          <i class="fas fa-download"></i> Descargar PDF
        </button>
      </div>
    </div>
  </div>
</div>
