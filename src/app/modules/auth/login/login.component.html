<!--begin::Form-->
<form class="form w-100 h-20px" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
  <!--begin::Heading-->
  <div class="text-center mb-11">
    <h1 class="NomEmpresa text-gray-900 fw-bolder mb-3">
      Sara-tech
    </h1>
    <!--begin::Subtitle-->
    <div class="text-gray-500 fw-semibold fs-6">
      Bienvenido a la plataforma de soluciones tech para empresa
    </div>
    <!--end::Subtitle--->
    <!-- <div class="text-gray-500 fw-bold fs-4">
      New Here?
      <a
        routerLink="/auth/registration"
        id="kt_login_signup"
        class="link-primary fw-bolder"
        >{{ "AUTH.GENERAL.SIGNUP_BUTTON" | translate }}</a
      >
    </div> -->
  </div>
  <!--end::Heading-->


  <!-- begin::Alert info-->
  <!-- <ng-container *ngIf="!hasError">
    <div class="mb-10 bg-light-info p-8 rounded">
      <div class="text-info">
        Usar cuenta <strong>{{ defaultAuth.email }}</strong> y contraseña
        <strong>{{ defaultAuth.password }}</strong> para continuar.
      </div>
    </div>
  </ng-container> -->
  <!-- end::Alert info-->

  <!-- begin::Alert error-->
  <ng-container *ngIf="hasError">
    <div class="mb-lg-15 alert alert-danger">
      <div class="alert-text font-weight-bold">
        {{ errorMsg || 'Los datos de inicio de sesión son incorrectos.' }}
      </div>
    </div>
  </ng-container>

  <!-- end::Alert error-->

  <!--begin::Login options-->
  <div class="row g-3 mt-3 mb-3">
    <button type="button" (click)="loginWithMicrosoft()" [disabled]="isLoading"
      class="btn btn-flex btn-outline btn-text-gray-700 btn-active-color-primary bg-state-light flex-center text-nowrap w-100">
      <img alt="Logo Microsoft" src="/assets/media/svg/brand-logos/microsoft.svg" class="img-20 me-3" />
      <span *ngIf="!isMicrosoftLoading">Iniciar sesión con Microsoft</span>
      <span *ngIf="isMicrosoftLoading" class="d-flex align-items-center">
        <span class="spinner-border spinner-border-sm me-2" role="status"></span>
        Conectando...
      </span>
    </button>
  </div>
  <!--end::Login options-->

  <!--begin::Separator-->
  <div class="separator separator-content my-14">
    <span class="w-50px text-gray-300 fw-semibold fs-7">O</span>
  </div>
  <!--end::Separator-->

  <!--begin::Form group-->
  <div class="fv-row mb-8">
    <label class="form-label fs-6 fw-bolder text-gray-900">Correo electrónico</label>
    <input class="form-control bg-transparent" type="email" name="email" formControlName="email" autocomplete="off"
      (input)="clearError()" [ngClass]="{
        'is-invalid': loginForm.controls['email'].invalid && (loginForm.controls['email'].dirty || loginForm.controls['email'].touched),
        'is-valid': loginForm.controls['email'].valid && loginForm.controls['email'].dirty
      }" />
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
        validation: 'required',
        message: 'El correo electrónico es obligatorio',
        control: loginForm.controls['email']
      }"></ng-container>
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
        validation: 'email',
        message: 'El formato del correo electrónico no es válido',
        control: loginForm.controls['email']
      }"></ng-container>
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
        validation: 'minLength',
        message: 'El correo debe tener al menos 3 caracteres',
        control: loginForm.controls['email']
      }"></ng-container>
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
        validation: 'maxLength',
        message: 'El correo debe tener máximo 360 caracteres',
        control: loginForm.controls['email']
      }"></ng-container>
  </div>
  <!--end::Form group-->

  <!--begin::Form group-->
  <div class="fv-row mb-3">

    <label class="form-label fw-bolder text-gray-900 fs-6 mb-0">Contraseña</label>

    <div class="position-relative">
      <input class="form-control bg-transparent pe-5" [type]="showPassword ? 'text' : 'password'"
        name="password" autocomplete="current-password"
        formControlName="password" (input)="clearError()"
        [ngClass]="{
          'is-invalid': loginForm.controls['password'].invalid && (loginForm.controls['password'].dirty || loginForm.controls['password'].touched),
          'is-valid': loginForm.controls['password'].valid && loginForm.controls['password'].dirty
        }" />
      <button type="button"
        class="btn-sm btn-icon position-absolute top-50 end-0 translate-middle-y p-0 me-3"
        (click)="togglePasswordVisibility()"
        style="border:none; background:none; z-index:5;">
        <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"
          style="font-size:1.1rem; color:#6c757d;"></i>
      </button>
    </div>


    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
        validation: 'required',
        message: 'La contraseña es obligatoria',
        control: loginForm.controls['password']
      }"></ng-container>
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
        validation: 'minlength',
        message: 'La contraseña debe tener al menos 6 caracteres',
        control: loginForm.controls['password']
      }"></ng-container>
    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
        validation: 'maxLength',
        message: 'La contraseña debe tener un máximo de 50 caracteres',
        control: loginForm.controls['password']
      }"></ng-container>

  </div>
  <!--end::Form group-->

  <!--begin::Wrapper-->
  <div class="d-flex flex-stack flex-wrap gap-3 fs-base fw-semibold mb-8">
    <!--begin::Remember me-->
    <div class="form-check">
      <input class="form-check-input" type="checkbox" formControlName="rememberMe" id="rememberMe">
      <label class="form-check-label text-gray-700" for="rememberMe">
        Recordarme
      </label>
    </div>
    <!--end::Remember me-->

    <!--begin::Link-->
    <a routerLink="/auth/forgot-password" class="link-primary">
      ¿Has olvidado tu contraseña?
    </a>
    <!--end::Link-->
  </div>
  <!--end::Wrapper-->

  <!--begin::Action-->
  <div class="d-grid mb-4">
    <button type="submit" id="kt_sign_in_submit" class="btn btn-primary" [disabled]="loginForm.invalid || isLoading">
      <ng-container *ngIf="isLoading">
        <span class="indicator-progress" style="display:block;">
          Espere por favor...
          <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
        </span>
      </ng-container>
      <ng-container *ngIf="!isLoading">
        <span class="indicator-label">Continuar</span>
      </ng-container>
    </button>
  </div>

  <div class="text-gray-500 text-center fw-semibold fs-6">
    ¿Deseas registrarte? &nbsp;<a routerLink="/auth/registration" class="link-primary">Registrarte</a>
  </div>
  <!--end::Action-->
</form>
<!--end::Form-->

<ng-template #formError let-control="control" let-message="message" let-validation="validation">
  <ng-container *ngIf="control.hasError(validation) && (control.dirty || control.touched)">
    <div class="fv-plugins-message-container">
      <span role="alert">
        {{ message }}
      </span>
    </div>
  </ng-container>
</ng-template>
